# =============================================================================
#  gas-telemetry-command-api — REST API
#
#  Per sviluppo locale: SPRING_PROFILES_ACTIVE=local → H2 in-memory.
# =============================================================================

spring.application.name=gas-telemetry-command-api

# HTTP
server.port=${COMMAND_API_PORT:8090}

# DataSource — PostgreSQL+TimescaleDB (DB unico condiviso)
spring.datasource.url=${COMMAND_API_DB_URL:jdbc:postgresql://localhost:5432/gas_telemetry}
spring.datasource.username=${COMMAND_API_DB_USER:gas}
spring.datasource.password=${COMMAND_API_DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Schema gestito dal DBA — qui solo validate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# Logging
logging.level.com.aton.proj.gastelemetry.commandapi=DEBUG
logging.level.org.hibernate.SQL=INFO
