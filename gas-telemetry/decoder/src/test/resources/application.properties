# =============================================================================
#  Test override per gas-telemetry-decoder
#
#  @DataJpaTest e @SpringBootTest senza profilo specifico usano questo file.
#  H2 in-memory + ddl-auto=create-drop: nessuna dipendenza esterna richiesta.
# =============================================================================

spring.datasource.url=jdbc:h2:mem:gas-decoder-test;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
