# =============================================================================
#  Profilo "local" — sviluppo decoder senza infrastruttura esterna
#
#  Attivazione: SPRING_PROFILES_ACTIVE=local
#
#  Override:
#   - DataSource: H2 in-memory (no PostgreSQL richiesto)
#   - DDL: Hibernate crea/distrugge ad ogni avvio (nessuna entity per ora)
#   - Event Hub: EventHubConsumer NON caricato (vedi @Profile("!local"))
#       → il decoder si avvia ma non consuma eventi
# =============================================================================

# H2 in-memory (TimescaleDB non disponibile in locale: usato solo come placeholder)
spring.datasource.url=jdbc:h2:mem:gas-decoder;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop

# Event Hub: nessuna property necessaria, EventHubConsumer disabilitato dal @Profile
