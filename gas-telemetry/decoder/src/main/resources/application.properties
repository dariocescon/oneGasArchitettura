# =============================================================================
#  gas-telemetry-decoder — configurazione base (profilo "default" = prod-like)
#
#  Per sviluppo locale: SPRING_PROFILES_ACTIVE=local
#    → datasource H2, EventHubConsumer disabilitato, nessuna dipendenza esterna
# =============================================================================

spring.application.name=gas-telemetry-decoder

# -----------------------------------------------------------------------------
#  DataSource — placeholder PostgreSQL+TimescaleDB, env vars in produzione.
#  TODO: oggi Hibernate non ha entity da gestire (ConfigEntity e
#        TimeSeriesEntity arrivano nei task 6/7 della roadmap).
#        ddl-auto=validate va bene perché non c'è schema da verificare.
# -----------------------------------------------------------------------------
spring.datasource.url=${DECODER_DB_URL:jdbc:postgresql://localhost:5432/gas_telemetry}
spring.datasource.username=${DECODER_DB_USER:gas}
spring.datasource.password=${DECODER_DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# Batch insert per TimeSeriesService (hypertable device_measures/device_alarms).
# Senza queste property Hibernate emette una INSERT per riga: fatale al rate
# di pacchetti TEK822 in produzione. Con batch_size=50 e order_inserts=true
# le saveAll() diventano JDBC batch insert.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# -----------------------------------------------------------------------------
#  Azure Event Hub (consumer)
#  Usate solo nei profili NON-local. In profilo local, EventHubConsumer non
#  viene caricato e queste property non sono richieste.
# -----------------------------------------------------------------------------
eventhub.connection-string=${EVENTHUB_CONNECTION_STRING:}
eventhub.name=${EVENTHUB_NAME:}
eventhub.consumer-group=${EVENTHUB_CONSUMER_GROUP:$Default}

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logging.level.com.aton.proj.gastelemetry.decoder=DEBUG
logging.level.com.azure=INFO
logging.level.org.hibernate.SQL=INFO
