# =============================================================================
#  gas-telemetry-worker — configurazione base (profilo "default" = prod-like)
#
#  Per sviluppo locale: SPRING_PROFILES_ACTIVE=local
#    → datasource H2, PrimaryDataPublisher no-op, nessuna dipendenza esterna
# =============================================================================

spring.application.name=gas-telemetry-worker

# -----------------------------------------------------------------------------
#  DataSource — PostgreSQL+TimescaleDB (DB unico condiviso col decoder).
#  Override con env vars in produzione.
# -----------------------------------------------------------------------------
spring.datasource.url=${WORKER_DB_URL:jdbc:postgresql://localhost:5432/gas_telemetry}
spring.datasource.username=${WORKER_DB_USER:gas}
spring.datasource.password=${WORKER_DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

# -----------------------------------------------------------------------------
#  JPA / Hibernate
# -----------------------------------------------------------------------------
# Il dialect viene auto-rilevato da Hibernate sulla base del JDBC URL.
# Lo schema in prod è gestito dal DBA (vedi schema-*.sql), Hibernate solo valida.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.sql.init.mode=never

# -----------------------------------------------------------------------------
#  TCP server
# -----------------------------------------------------------------------------
worker.tcp.port=8091
worker.tcp.max-connections=1000
# Timeout per ogni read sul socket (ms). Se il device interrompe l'invio per
# più di questo intervallo la connessione viene chiusa con errore.
worker.tcp.read-timeout-ms=30000

# -----------------------------------------------------------------------------
#  Azure Event Hub (richiesto in tutti i profili eccetto "local")
#  Lasciate non risolte se mancano: l'avvio fallisce fast con messaggio chiaro.
# -----------------------------------------------------------------------------
eventhub.connection-string=${EVENTHUB_CONNECTION_STRING:}
eventhub.name=${EVENTHUB_NAME:}

# -----------------------------------------------------------------------------
#  Logging
# -----------------------------------------------------------------------------
logging.level.com.aton.proj.gastelemetry.worker=DEBUG
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.jdbc.bind=WARN
