# =============================================================================
#  Profilo "local" — sviluppo senza infrastruttura esterna
#
#  Attivazione: SPRING_PROFILES_ACTIVE=local
#
#  Override:
#   - DataSource: H2 in-memory (no MSSQL/PostgreSQL richiesto)
#   - DDL: Hibernate crea/distrugge ad ogni avvio
#   - Event Hub: bean PrimaryDataPublisher in modalità no-op
#       (selezione automatica via @Profile in EventHubProducerConfig)
# =============================================================================

# H2 in-memory
spring.datasource.url=jdbc:h2:mem:gas-worker;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate gestisce lo schema (in prod è il DBA)
spring.jpa.hibernate.ddl-auto=create-drop

# Event Hub: nessuna property necessaria, il bean no-op è auto-selezionato
# eventhub.connection-string e eventhub.name vengono ignorate in profilo local
