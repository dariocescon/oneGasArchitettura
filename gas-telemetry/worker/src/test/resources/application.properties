# =============================================================================
#  Override per i test del worker.
#
#  - @DataJpaTest sostituisce il datasource con H2 in-memory tramite
#    @AutoConfigureTestDatabase. Lasciamo che Hibernate auto-rilevi il dialect
#    dall'URL H2 (non hardcodiamo SQLServerDialect, che fallirebbe).
#  - Hibernate crea/distrugge lo schema dalle entity ad ogni run di test
#    (in prod invece è validate + DDL gestito dal DBA).
# =============================================================================

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Test logging più verboso per il package del worker
logging.level.com.aton.proj.gastelemetry.worker=DEBUG
logging.level.org.hibernate.SQL=WARN
